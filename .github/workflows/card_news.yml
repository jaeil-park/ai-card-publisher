name: 📱 SNS Card News Auto Post

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 KST ☀️  아침 종합 브리핑 (AI + 빅테크 + 코인)
    - cron: '0 0 * * *'    # 09:00 KST 🏢  빅테크 IT 뉴스 + 링크 공유
    - cron: '0 3 * * *'    # 12:00 KST 📊  시장 시황 (코인 + 증시 + 환율)
    - cron: '0 6 * * *'    # 15:00 KST 🦄  스타트업/VC 트렌드
    - cron: '0 9 * * *'    # 18:00 KST 🚀  테크/AI 신제품 (Product Hunt)
    - cron: '0 12 * * *'   # 21:00 KST 🧠  AI 팁(월/수/금) / 바이브코딩 티타임(화/목/토)
    - cron: '0 11 * * 0'   # 20:00 KST 일요일 📅  한 주 핵심 정리
  workflow_dispatch:

jobs:
  post-card-news:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔐 Load ENV
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: 🎭 Install Playwright Browsers & Deps
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then playwright install chromium; fi
          playwright install-deps chromium

      - name: 🔨 Build card-ui
        run: npm ci --prefix card-ui && npm run build --prefix card-ui

      - name: 🚀 Run Card News Pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: 💾 Commit & Push data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          [ -f .token_status.json ] && git add .token_status.json
          [ -d analytics ] && git add analytics/posts.json
          git diff --staged --quiet || git commit -m "🤖 auto: update post and token data [skip ci]"
          git push
