name: 📱 SNS Card News Auto Post

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 KST ☀️  아침 AI 브리핑
    - cron: '0 0 * * *'    # 09:00 KST 💻  개발 트렌드 (GitHub + HN)
    - cron: '0 3 * * *'    # 12:00 KST 📊  시장 시황 (코인 + 증시)
    - cron: '0 6 * * *'    # 15:00 KST 🛠️  AI 개발툴 팁
    - cron: '0 9 * * *'    # 18:00 KST 🚀  AI 신제품 (Product Hunt)
    - cron: '0 12 * * *'   # 21:00 KST 🧠  AI 비서 실전 팁
    - cron: '0 11 * * 0'   # 20:00 KST 일요일 📅  한 주 AI 하이라이트 정리
  workflow_dispatch:

jobs:
  post-card-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔐 Load ENV
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 🔤 Install Korean Font
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Card News Pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py
