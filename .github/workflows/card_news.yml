name: 📱 SNS Card News Auto Post

on:
  schedule:
    # 2026-07 2차 개편: 3회/일(+일요일 특집) → 1회/일로 재조정. Threads 계정
    # 정지 사고 이후 고빈도 게시 위험을 근본적으로 제거하기 위함. 콘텐츠
    # 타입은 요일별 로테이션으로 결정(src/trend_fetcher.py get_content_type()).
    # 릴스(ai_trend_publisher, 07:30/20:30 KST)와 겹치지 않게 간격 유지.
    - cron: '0 0 * * *'    # 09:00 KST — 1일 1회
  workflow_dispatch:

jobs:
  post-card-news:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔐 Load ENV
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}-${{ hashFiles('**/playwright/**') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 🎭 Install Playwright Browsers & Deps
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 🔨 Build card-ui
        run: npm ci --prefix card-ui && npm run build --prefix card-ui

      - name: 🚀 Run Card News Pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: 💾 Commit & Push data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          [ -f .token_status.json ] && git add .token_status.json
          [ -d analytics ] && git add analytics/posts.json
          git diff --staged --quiet || git commit -m "🤖 auto: update post and token data [skip ci]"
          git pull --rebase && git push
