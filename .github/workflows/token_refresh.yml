name: 🔑 Token Auto Refresh

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 09:00 KST
  workflow_dispatch:

jobs:
  refresh-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔐 Load ENV
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 📦 Install dependencies
        run: pip install requests PyNaCl python-dotenv

      - name: 🔑 Check & Refresh Tokens
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/token_manager.py

      - name: 📢 Notify on failure
        if: failure()
        run: |
          source .env
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ [ai-card-publisher] Token 갱신 실패! GitHub Actions 확인 필요"}'
